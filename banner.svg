<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0e"/>
      <stop offset="100%" style="stop-color:#161620"/>
    </linearGradient>
    <linearGradient id="acidGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#39ff14"/>
      <stop offset="100%" style="stop-color:#2acc10"/>
    </linearGradient>
    <linearGradient id="qGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#bf00ff"/>
      <stop offset="50%" style="stop-color:#ff2d95"/>
      <stop offset="100%" style="stop-color:#bf00ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="acidGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="320" fill="url(#bg)"/>
  
  <!-- Scanlines -->
  <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
    <rect width="4" height="2" fill="rgba(0,0,0,0.06)"/>
  </pattern>
  <rect width="900" height="320" fill="url(#scanlines)"/>
  
  <!-- Grid lines -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="180" y1="0" x2="180" y2="320"/>
    <line x1="360" y1="0" x2="360" y2="320"/>
    <line x1="540" y1="0" x2="540" y2="320"/>
    <line x1="720" y1="0" x2="720" y2="320"/>
  </g>
  
  <!-- Acid wave decoration -->
  <path d="M0 200 Q50 170 100 200 Q150 230 200 200 Q250 170 300 200 Q350 230 400 200 Q450 170 500 200 Q550 230 600 200 Q650 170 700 200 Q750 230 800 200 Q850 170 900 200" fill="none" stroke="#39ff14" stroke-width="1.5" opacity="0.12" filter="url(#glow)"/>
  <path d="M0 210 Q60 185 120 210 Q180 235 240 210 Q300 185 360 210 Q420 235 480 210 Q540 185 600 210 Q660 235 720 210 Q780 185 840 210 Q870 220 900 210" fill="none" stroke="#bf00ff" stroke-width="1" opacity="0.08" filter="url(#glow)"/>
  
  <!-- Quantum dots -->
  <circle cx="120" cy="80" r="2" fill="#bf00ff" opacity="0.3"/>
  <circle cx="340" cy="60" r="1.5" fill="#39ff14" opacity="0.2"/>
  <circle cx="560" cy="90" r="2.5" fill="#00d4ff" opacity="0.15"/>
  <circle cx="780" cy="70" r="1.8" fill="#ff2d95" opacity="0.2"/>
  <circle cx="200" cy="250" r="2" fill="#39ff14" opacity="0.15"/>
  <circle cx="680" cy="260" r="1.5" fill="#bf00ff" opacity="0.2"/>
  
  <!-- Title -->
  <text x="450" y="115" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="900" font-size="72" letter-spacing="12" fill="url(#acidGrad)" filter="url(#acidGlow)">Q-ACID</text>
  <text x="450" y="165" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-weight="300" font-size="48" letter-spacing="20" fill="#c0c0cc">303</text>
  
  <!-- Subtitle -->
  <text x="450" y="210" text-anchor="middle" font-family="'Courier New',monospace" font-size="13" letter-spacing="6" fill="#5a5a72" text-transform="uppercase">QUANTUM ACID MACHINE</text>
  
  <!-- Bottom tags -->
  <rect x="240" y="245" width="90" height="22" rx="3" fill="none" stroke="#39ff14" stroke-width="0.8" opacity="0.5"/>
  <text x="285" y="260" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" letter-spacing="2" fill="#39ff14" opacity="0.7">SUPERPOSITION</text>
  
  <rect x="345" y="245" width="70" height="22" rx="3" fill="none" stroke="#bf00ff" stroke-width="0.8" opacity="0.5"/>
  <text x="380" y="260" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" letter-spacing="2" fill="#bf00ff" opacity="0.7">COLLAPSE</text>
  
  <rect x="430" y="245" width="90" height="22" rx="3" fill="none" stroke="#ff2d95" stroke-width="0.8" opacity="0.5"/>
  <text x="475" y="260" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" letter-spacing="2" fill="#ff2d95" opacity="0.7">DECOHERENCE</text>
  
  <rect x="535" y="245" width="90" height="22" rx="3" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.5"/>
  <text x="580" y="260" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" letter-spacing="2" fill="#00d4ff" opacity="0.7">ENTANGLEMENT</text>
  
  <!-- Version pill -->
  <rect x="380" y="280" width="74" height="18" rx="9" fill="rgba(191,0,255,0.1)" stroke="#bf00ff" stroke-width="0.5" opacity="0.6"/>
  <text x="417" y="293" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" letter-spacing="1.5" fill="#bf00ff" opacity="0.8">v3 • PWA</text>
  
  <!-- SheffRave credit -->
  <text x="470" y="293" text-anchor="start" font-family="'Courier New',monospace" font-size="9" letter-spacing="1.5" fill="#5a5a72" opacity="0.7">by</text>
  <text x="495" y="293" text-anchor="start" font-family="'Courier New',monospace" font-size="9" letter-spacing="1.5" fill="#39ff14" opacity="0.8" font-weight="700">SHEFFRAVE</text>
  
  <!-- Top border accent -->
  <rect x="0" y="0" width="900" height="2" fill="url(#acidGrad)" opacity="0.6"/>
  <!-- Bottom border accent -->
  <rect x="0" y="318" width="900" height="2" fill="url(#qGrad)" opacity="0.4"/>
</svg>
